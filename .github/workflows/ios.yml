name: NeuroGuia iOS — Build & Deploy para TestFlight

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-ios:
    name: Build & Upload para TestFlight
    runs-on: macos-14 # Garante o Xcode 15+ estável no ambiente do GitHub
    environment: production

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar o Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Dependências do Flutter
        run: |
          # 1. Limpa o espaço de trabalho local do Runner
          flutter clean
          
          # 2. Cria a árvore de diretórios ANTES que qualquer hook nativo tente ler ou escrever
          mkdir -p build/ios/SourcePackages
          mkdir -p ios/Flutter
          
          # 3. Executa a resolução das dependências do pubspec
          flutter pub get

      - name: Importar Certificado de Distribuição (.p12)
        uses: apple-actions/import-codesign-certs@v3
        with:
          # 💡 Ajustado para bater exatamente com os nomes do seu painel do GitHub
          p12-file-base64: ${{ secrets.APP_STORE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}

      - name: Baixar Perfil de Provisionamento da Apple
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: 'com.maoamiga.app.app'
          issuer-id: ${{ secrets.APP_STORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_KEY_ID }}
          # 💡 Ajustado para o nome real da sua chave da API da Apple Store
          api-private-key: ${{ secrets.APP_STORE_CONNECT_KEY }}

      - name: Compilar o pacote IPA do Flutter
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Enviar o build para o TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_KEY_ID }}
          # 💡 Ajustado para o nome real da sua chave da API da Apple Store
          api-private-key: ${{ secrets.APP_STORE_CONNECT_KEY }}