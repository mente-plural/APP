name: NeuroGuia iOS — Build & Deploy para TestFlight

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-ios:
    name: Build & Upload para TestFlight
    runs-on: macos-14 # Garante o Xcode 15+ estável no ambiente do GitHub

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar o Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Dependências do Flutter
        run: |
          flutter clean
          flutter pub get

      - name: Importar Certificado de Distribuição (.p12)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}

      - name: Baixar Perfil de Provisionamento da Apple
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: 'com.maoamiga.app.app'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Compilar o pacote IPA do Flutter
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Enviar o build para o TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}