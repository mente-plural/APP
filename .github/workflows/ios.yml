name: NeuroGuia iOS Release

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-ios:
    name: Build e Deploy iOS App Store
    runs-on: macos-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar o Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Dependências do Flutter
        run: |
          flutter clean
          flutter pub get

      - name: Instalar Certificado de Distribuição Apple Nativamente
        env:
          P12_BASE64: ${{ secrets.APP_STORE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}
        run: |
          # 1. Cria caminhos temporários seguros
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 2. Decodifica o texto Base64 de volta para o arquivo .p12 binário
          echo -n "$P12_BASE64" | base64 --decode --output $CERTIFICATE_PATH

          # 3. Cria e configura o chaveiro nativo do macOS na máquina virtual
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # 4. Importa o certificado para o chaveiro do sistema
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Compilar o pacote IPA (Release)
        run: |
          # Limpamos as flags inválidas. O Xcode usará o certificado importado no chaveiro.
          flutter build ipa --release --export-options-plist=ios/export_options.plist

      - name: Enviar o App para o TestFlight
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
        run: |
          xcrun altool --upload-app --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID"