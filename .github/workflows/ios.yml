name: NeuroGuia iOS — Build & Deploy para TestFlight

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-ios:
    name: Build & Upload para TestFlight
    runs-on: macos-14 # Garante o Xcode 15+ estável no ambiente do GitHub
    environment: production

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar o Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Dependências do Flutter
        run: |
          flutter clean
          mkdir -p build/ios/SourcePackages
          mkdir -p ios/Flutter
          flutter pub get

      - name: Compilar o pacote IPA do Flutter
        env:
          # 💡 O Xcode lê essas variáveis de ambiente para fazer a assinatura automática via API Key
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          # Aqui você pode adicionar seus --dart-define normalmente se precisar
          flutter build ipa --release --no-codesign --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
      - name: Enviar o build para o TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_KEY }}