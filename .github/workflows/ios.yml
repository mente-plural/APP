name: NeuroGuia iOS — Build & Deploy para TestFlight

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-ios:
    name: Build & Upload para TestFlight
    runs-on: macos-15
    environment: production

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar o Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Dependências do Flutter
        run: |
          flutter clean
          mkdir -p build/ios/SourcePackages
          mkdir -p ios/Flutter
          flutter pub get

      - name: Compilar e Assinar o pacote IPA automaticamente
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          # 1. Cria dinamicamente o arquivo de configuração exigido pelo Xcode para a nuvem
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>destination</key>
              <string>export</string>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>${{ secrets.APP_STORE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          
          # 2. Executa o build forçando o método app-store com o arquivo criado
          flutter build ipa --release \
            --export-method=app-store \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

      - name: Enviar o build para o TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_KEY }}